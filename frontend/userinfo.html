<script>

    (function () {
        try {
            var lu = JSON.parse(localStorage.getItem("LoggedUser"));
            if (!localStorage.getItem("e") && !(lu && lu.role === "admin")) location.replace("./profile.html");
        } catch (e) { location.replace("./profile.html"); }
    })();

    let tbody = document.getElementById("append");
    var TOKEN = (JSON.parse(localStorage.getItem("LoggedUser") || "null") || {}).token;
    var AUTH = TOKEN ? { "Authorization": "Bearer " + TOKEN } : {};

    async function update() {

        let res = await fetch("/user/get", { headers: AUTH })
        if (res.status === 401 || res.status === 403) {
            alert("Admin access required. Please log in with an admin account.");
            location.replace("./login.html");
            return;
        }
        let data = await res.json();
        display(data);
    }

    update();

    function display(data) {

        data.forEach(element => {

            let tr = document.createElement("tr");
            let td = document.createElement("td");
            let td1 = document.createElement("td");
            // let td3=document.createElement("td");

            td.innerHTML = element.name;
            td1.innerHTML = element.email;
            tr.append(td, td1);
            tbody.append(tr);
        })
    }

    // toggle
    $(`#menu-btn`).click(function () {
        $(`#menu`).toggleClass("active")
    })
</script>
