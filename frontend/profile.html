<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login · HangOut</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./style/theme.css" />
  <script>
    (function () { try { var t = localStorage.getItem('hangout-theme'); if (t) document.documentElement.setAttribute('data-theme', t); } catch (e) { } })();
  </script>
  <style>
    .admin-wrap { min-height: 100vh; min-height: 100dvh; display: grid; place-items: center; padding: var(--sp-6); }
    .admin-card { width: 100%; max-width: 400px; padding: var(--sp-8); animation: fade-up var(--dur-slow) var(--ease-out) both; }
    .admin-card .brand-mark {
      width: 52px; height: 52px; border-radius: var(--r-lg); display: grid; place-items: center;
      color: #fff; font-size: 1.5rem; font-weight: 800; margin-bottom: var(--sp-5);
      background: linear-gradient(135deg, var(--brand-400), var(--brand-600));
      box-shadow: 0 8px 20px -8px var(--brand-glow);
    }
    .admin-card h2 { font-size: var(--fs-2xl); margin-bottom: var(--sp-2); }
    .admin-card .sub { color: var(--text-2); font-size: var(--fs-sm); margin-bottom: var(--sp-6); }
    .admin-form { display: flex; flex-direction: column; gap: var(--sp-4); }
    .admin-topbar { position: fixed; top: var(--sp-5); right: var(--sp-5); }
    .hint { margin-top: var(--sp-5); font-size: var(--fs-xs); color: var(--text-3); text-align: center; }
    .hint a { color: var(--brand); }
  </style>
</head>

<body>
  <div class="admin-topbar"><button class="theme-toggle" id="themeToggle"></button></div>
  <div class="admin-wrap">
    <div class="card admin-card">
      <div class="brand-mark">H</div>
      <h2>Admin access</h2>
      <p class="sub">Sign in to the HangOut administration dashboard.</p>
      <form class="admin-form">
        <div class="field">
          <label for="email">Email</label>
          <input class="input" type="email" placeholder="admin@example.com" id="email" required>
        </div>
        <div class="field">
          <label for="password">Password</label>
          <input class="input" type="password" placeholder="••••••••" id="password" required>
        </div>
        <div class="auth-error" id="err" style="display:none;color:var(--danger);font-size:var(--fs-sm)"></div>
        <button class="btn btn-primary btn-block" type="submit">Log in</button>
      </form>
      <p class="hint">Not an admin? <a href="./login.html">Go to user login</a></p>
    </div>
  </div>

  <script src="./js/ui.js"></script>
  <script>
    UI.mountThemeToggle("#themeToggle");

    let data = [{ email: "himanshu@gmail.com", pass: "admin4321", profile: "./image/himanshu.png" },
    { email: "rahul@gmail.com", pass: "admin4321", profile: "./image/person-logo.png" },
    { email: "saloni@gmail.com", pass: "admin4321", profile: "./image/saloni.png" },
    { email: "yuvraj@gmail.com", pass: "admin4321", profile: "./image/person-logo.png" }]

    let form = document.querySelector("form")
    let err = document.getElementById("err")

    form.addEventListener("submit", (e) => {
      e.preventDefault()
      err.style.display = "none"
      localStorage.setItem("email", JSON.stringify(data))
      let passI = form.password.value
      let emailI = form.email.value
      if (passI != "" && emailI != "") {
        let match = data.find((ele) => ele.email == emailI && ele.pass == passI)
        if (match) {
          localStorage.setItem("e", emailI)
          UI.toast("Welcome, admin", { type: "success" })
          setTimeout(() => { self.location = "admin.html" }, 500)
        } else {
          err.textContent = "Invalid admin credentials."
          err.style.display = "block"
        }
      }
    })
  </script>
</body>

</html>
