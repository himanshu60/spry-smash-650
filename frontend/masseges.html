<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0b0b10" />
  <title>HangOut · Messages</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./style/theme.css" />
  <link rel="stylesheet" href="./style/masseges.css" />
  <script>
    (function () { try { var t = localStorage.getItem('hangout-theme'); if (t) document.documentElement.setAttribute('data-theme', t); } catch (e) { } })();
  </script>
</head>

<body>
  <div class="app" id="app">
    <!-- ===================== SIDEBAR ===================== -->
    <aside class="sidebar" id="sidebar">
      <header class="sidebar-head glass">
        <div class="brand" id="logo_msg" title="Home">
          <span class="brand-mark">H</span>
          <span class="brand-name">HangOut</span>
        </div>
        <div class="sidebar-actions">
          <button class="theme-toggle" id="themeToggle"></button>
          <button class="btn-icon" id="logoutBtn" title="Log out" aria-label="Log out">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
          </button>
        </div>
      </header>

      <div class="search-wrap">
        <span class="search-ico">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        </span>
        <input class="input search-input" id="searchInput" type="text" placeholder="Search conversations" autocomplete="off" />
      </div>

      <div class="chatlist" id="chatlist" role="list" aria-label="Conversations">
        <!-- skeletons injected, then chat items -->
      </div>

      <footer class="sidebar-foot" id="meCard"></footer>
    </aside>

    <!-- ===================== CHAT ===================== -->
    <main class="chat" id="chat">
      <!-- Empty (no conversation selected) -->
      <section class="chat-empty" id="chatEmpty">
        <div class="empty-state">
          <div class="empty-icon">
            <svg viewBox="0 0 24 24" width="34" height="34" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
          </div>
          <h3>Your messages</h3>
          <p>Select a conversation from the left to start chatting in real time.</p>
        </div>
      </section>

      <!-- Active conversation -->
      <section class="chat-active" id="chatActive" hidden>
        <header class="chat-head glass">
          <button class="btn-icon back-btn" id="backBtn" aria-label="Back to conversations">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
          </button>
          <div class="peer" id="peer"></div>
          <div class="chat-head-actions">
            <button class="btn-icon" title="Voice call" aria-label="Voice call">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.13.96.36 1.9.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.9.34 1.85.57 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
            </button>
            <button class="btn-icon" title="Video call" aria-label="Video call">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2" ry="2"/></svg>
            </button>
          </div>
        </header>

        <div class="chatbox" id="chatbox">
          <!-- messages injected -->
        </div>

        <!-- typing indicator -->
        <div class="typing-row" id="typingRow" hidden>
          <div class="typing-bubble"><span></span><span></span><span></span></div>
        </div>

        <!-- scroll to bottom -->
        <button class="scroll-fab" id="scrollFab" hidden aria-label="Scroll to latest">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
        </button>

        <!-- composer -->
        <footer class="composer">
          <div class="emoji-wrap">
            <button class="btn-icon" id="emojiBtn" title="Emoji" aria-label="Insert emoji">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M8 14s1.5 2 4 2 4-2 4-2"/><line x1="9" y1="9" x2="9.01" y2="9"/><line x1="15" y1="9" x2="15.01" y2="9"/></svg>
            </button>
            <div class="emoji-panel card" id="emojiPanel" hidden></div>
          </div>
          <textarea class="msg composer-input" id="msgInput" rows="1" placeholder="Type a message…" autocomplete="off"></textarea>
          <button class="send-btn" id="msg_send" aria-label="Send message" disabled>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
          </button>
        </footer>
      </section>
    </main>

    <div class="sidebar-scrim" id="scrim" hidden></div>
  </div>

  <script src="https://cdn.socket.io/4.6.0/socket.io.min.js"></script>
  <script src="./js/ui.js"></script>
  <script src="./js/chat.js"></script>
</body>

</html>
